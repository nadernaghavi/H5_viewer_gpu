services:
  backend:
    build:
      context: ./backend
    container_name: myapp-backend
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
    expose:
      - "8000"

  frontend:
    build:
      context: ./frontend
    container_name: myapp-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend