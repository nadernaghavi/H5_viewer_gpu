services:
  backend:
    build:
      context: ./backend
    container_name: myapp-backend
    restart: unless-stopped
    expose:
      - "8000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  frontend:
    build:
      context: ./fronend
    container_name: myapp-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend